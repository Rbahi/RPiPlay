name: Build RPiPlay

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          cmake \
          build-essential \
          libavahi-compat-libdnssd-dev \
          libplist-dev \
          libssl-dev \
          libglib2.0-dev \
          libavcodec-dev \
          libavformat-dev \
          libswscale-dev \
          libavutil-dev

    - name: Create build folder
      run: mkdir build

    - name: Run CMake
      run: |
        cd build
        cmake ..

    - name: Compile
      run: |
        cd build
        make -j$(nproc)

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: rpiplay-build
        path: build/rpiplay
